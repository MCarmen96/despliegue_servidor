services:
  # --- BASE DE DATOS ---
  db:
    image: postgres:15
    container_name: prieto-eats-db
    restart: always
    environment:
      POSTGRES_DB: prieto_eats
      POSTGRES_USER: m_carmen
      POSTGRES_PASSWORD: prieto_eats_mcarmen
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - red-interna

  # --- APLICACIÓN ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prieto-eats
    restart: always
    env_file:
      - .env
    environment:
      - VIRTUAL_HOST=prietoeats.mcarmen.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=prietoeats.mcarmen.servidorgp.somosdelprieto.com
    networks:
      - red-internet
      - red-interna
    depends_on:
      - db

networks:
  red-internet:
    external: true
  red-interna:
    external: true

volumes:
  db_data:
